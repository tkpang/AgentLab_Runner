name: Release Runner (Windows)

on:
  workflow_dispatch:
  push:
    tags:
      - "runner-v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Build GUI app (win-unpacked)
        working-directory: gui
        run: npm run build:win:dir

      - name: Build release zip
        id: bundle
        shell: pwsh
        run: |
          $version = ""
          if ("${{ github.ref }}".StartsWith("refs/tags/runner-v")) {
            $version = "${{ github.ref_name }}".Substring("runner-v".Length)
          } else {
            $pkg = Get-Content "gui/package.json" -Raw | ConvertFrom-Json
            $version = [string]$pkg.version
          }

          powershell -NoProfile -ExecutionPolicy Bypass -File "scripts/build-release-windows.ps1" -Version $version -SkipBuild
          $zipPath = (Resolve-Path "gui/dist/AgentLab-Runner-$version-windows-x64.zip").Path
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentlab-runner-windows-${{ steps.bundle.outputs.version }}
          path: ${{ steps.bundle.outputs.zip_path }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/runner-v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.bundle.outputs.zip_path }}
          generate_release_notes: true
