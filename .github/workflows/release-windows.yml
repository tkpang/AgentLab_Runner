name: Release Runner (Windows + Linux)

on:
  workflow_dispatch:
  push:
    tags:
      - "runner-v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = ""
          if ("${{ github.ref }}".StartsWith("refs/tags/runner-v")) {
            $version = "${{ github.ref_name }}".Substring("runner-v".Length)
          } else {
            $pkg = Get-Content "gui/package.json" -Raw | ConvertFrom-Json
            $version = [string]$pkg.version
          }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Build GUI app (win-unpacked)
        working-directory: gui
        run: npm run build:win:dir

      - name: Build release zip
        id: bundle
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.value }}"
          powershell -NoProfile -ExecutionPolicy Bypass -File "scripts/build-release-windows.ps1" -Version $version -SkipBuild
          $zipPath = (Resolve-Path "gui/dist/AgentLab-Runner-$version-windows-x64.zip").Path
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentlab-runner-windows-${{ steps.version.outputs.value }}
          path: ${{ steps.bundle.outputs.zip_path }}

  build-linux:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/runner-v* ]]; then
            version="${GITHUB_REF_NAME#runner-v}"
          else
            version="$(node -p "require('./gui/package.json').version")"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Build Linux tar.gz
        shell: bash
        run: |
          chmod +x scripts/build-release-linux.sh
          scripts/build-release-linux.sh "${{ steps.version.outputs.value }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentlab-runner-linux-${{ steps.version.outputs.value }}
          path: dist/AgentLab-Runner-${{ steps.version.outputs.value }}-linux-x64.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/runner-v')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.zip
            release-artifacts/**/*.tar.gz
          generate_release_notes: true
